services:
  codex-agent-daily-sudo:
    build:
      context: ../..
      dockerfile: docker/agent-daily-ubuntu-sudo/Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    image: quadrafuzz-agent-daily-ubuntu-sudo:latest
    working_dir: /workspace
    tty: true
    stdin_open: true
    init: true
    pids_limit: 512
    volumes:
      - type: bind
        source: ${WORKSPACE_DIR:?set WORKSPACE_DIR to an absolute host path}
        target: /workspace
      - type: volume
        source: codex-home
        target: /home/agent/.codex
    tmpfs:
      - /tmp:exec,mode=1777,size=1g
      - /run:size=64m
    environment:
      - TERM=xterm-256color
      - HOME=/home/agent
      - CODEX_HOME=/home/agent/.codex
      - OPENAI_API_KEY

volumes:
  codex-home:
