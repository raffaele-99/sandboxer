<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{{ sandbox_name }} — Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1e1e1e; }
    #terminal-container {
      width: 100%; height: 100%;
      touch-action: manipulation;
    }
    #status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #2d2d2d; color: #999; padding: 4px 12px;
      font-family: monospace; font-size: 12px; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
    }
    #status-bar a { color: #7eb8da; text-decoration: none; }
    #status-bar .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 6px;
    }
    #status-bar .status-dot.connected { background: #4caf50; }
    #status-bar .status-dot.disconnected { background: #f44336; }
    #status-bar .status-dot.connecting { background: #ff9800; }
  </style>
</head>
<body>
  <div id="status-bar">
    <span>
      <span id="status-dot" class="status-dot connecting"></span>
      <span id="status-text">Connecting...</span>
      {{ sandbox_name }}
    </span>
    <a href="/">&larr; Dashboard</a>
  </div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    window.SANDBOX_NAME = "{{ sandbox_name }}";
  </script>
  <script src="/static/terminal.js"></script>
</body>
</html>
