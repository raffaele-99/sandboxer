{% extends "base.html" %}
{% block title %}Creating Sandbox — Sandboxer{% endblock %}

{% block head %}
<style>
  @keyframes pulse-bar { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .pulse-bar { animation: pulse-bar 2s ease-in-out infinite; }
  #log-output { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  #log-output::-webkit-scrollbar { width: 6px; }
  #log-output::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-3xl">
  <div class="mb-6">
    <a href="/sandboxes/new" class="text-sm text-slate-400 hover:text-cyan-400 transition-colors">&larr; Back</a>
    <h1 class="text-2xl font-bold text-white mt-2">Creating Sandbox</h1>
  </div>

  <!-- Progress card -->
  <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 mb-4">
    <div class="flex items-center gap-3 mb-4">
      <div id="spinner" class="shrink-0">
        <svg class="w-5 h-5 animate-spin text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
      </div>
      <div id="status-icon-done" class="shrink-0 hidden">
        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <div id="status-icon-error" class="shrink-0 hidden">
        <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </div>
      <div>
        <div id="current-step" class="text-sm text-white font-medium">Initializing...</div>
        <div id="elapsed" class="text-xs text-slate-500 mt-0.5"></div>
      </div>
    </div>
    <div id="progress-bar" class="w-full bg-slate-700 rounded-full h-1 overflow-hidden">
      <div class="bg-cyan-500 h-1 rounded-full pulse-bar transition-all duration-500" id="progress-fill" style="width: 5%"></div>
    </div>
  </div>

  <!-- Steps log -->
  <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
    <div class="flex items-center justify-between px-4 py-2.5 border-b border-slate-700">
      <span class="text-xs text-slate-400 font-medium">Build Output</span>
      <button onclick="toggleLog()" id="log-toggle" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Show</button>
    </div>
    <div id="log-container" class="hidden">
      <div id="log-output" class="p-4 text-xs text-slate-500 leading-relaxed max-h-96 overflow-y-auto whitespace-pre-wrap"></div>
    </div>
    <div id="steps-list" class="p-4 space-y-2"></div>
  </div>
</div>

<script>
(function() {
  var stepEl = document.getElementById("current-step");
  var elapsedEl = document.getElementById("elapsed");
  var progressFill = document.getElementById("progress-fill");
  var spinner = document.getElementById("spinner");
  var iconDone = document.getElementById("status-icon-done");
  var iconError = document.getElementById("status-icon-error");
  var logOutput = document.getElementById("log-output");
  var logContainer = document.getElementById("log-container");
  var logToggle = document.getElementById("log-toggle");
  var stepsList = document.getElementById("steps-list");

  var startTime = Date.now();
  var logVisible = false;
  var stepCount = 0;

  window.toggleLog = function() {
    logVisible = !logVisible;
    logContainer.classList.toggle("hidden", !logVisible);
    logToggle.textContent = logVisible ? "Hide" : "Show";
  };

  // Elapsed timer.
  var timer = setInterval(function() {
    var s = Math.floor((Date.now() - startTime) / 1000);
    var m = Math.floor(s / 60);
    s = s % 60;
    elapsedEl.textContent = (m > 0 ? m + "m " : "") + s + "s";
  }, 1000);

  function addStep(text, type) {
    var div = document.createElement("div");
    div.className = "flex items-center gap-2 text-xs";
    var icon = type === "error"
      ? '<svg class="w-3 h-3 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
      : '<svg class="w-3 h-3 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
    var color = type === "error" ? "text-red-400" : "text-slate-400";
    div.innerHTML = icon + '<span class="' + color + '">' + escapeHtml(text) + '</span>';
    stepsList.appendChild(div);
  }

  function escapeHtml(text) {
    var d = document.createElement("div");
    d.textContent = text;
    return d.innerHTML;
  }

  var source = new EventSource("{{ sse_url | safe }}");

  source.addEventListener("step", function(e) {
    var data = JSON.parse(e.data);
    stepCount++;
    // Progress: roughly 5 steps total.
    var pct = Math.min(90, stepCount * 20);
    progressFill.style.width = pct + "%";
    stepEl.textContent = data.message;
    addStep(data.message, "step");
  });

  source.addEventListener("log", function(e) {
    var data = JSON.parse(e.data);
    logOutput.textContent += data.message + "\n";
    logOutput.scrollTop = logOutput.scrollHeight;
    // Auto-show log on first build output.
    if (!logVisible && logOutput.textContent.length > 0) {
      logVisible = true;
      logContainer.classList.remove("hidden");
      logToggle.textContent = "Hide";
    }
  });

  source.addEventListener("done", function(e) {
    var data = JSON.parse(e.data);
    source.close();
    clearInterval(timer);
    progressFill.style.width = "100%";
    progressFill.classList.remove("pulse-bar");
    spinner.classList.add("hidden");
    iconDone.classList.remove("hidden");
    stepEl.textContent = "Sandbox created successfully!";
    stepEl.classList.add("text-emerald-400");
    addStep("Done!", "step");
    // Redirect after a brief pause.
    setTimeout(function() {
      window.location.href = data.redirect;
    }, 1000);
  });

  source.addEventListener("error", function(e) {
    if (e.data) {
      var data = JSON.parse(e.data);
      source.close();
      clearInterval(timer);
      progressFill.classList.remove("pulse-bar");
      progressFill.classList.add("bg-red-500");
      spinner.classList.add("hidden");
      iconError.classList.remove("hidden");
      stepEl.textContent = data.message;
      stepEl.classList.add("text-red-400");
      addStep(data.message, "error");
    }
  });

  source.onerror = function() {
    // EventSource reconnect errors — if the stream ended, just close.
    source.close();
  };
})();
</script>
{% endblock %}
