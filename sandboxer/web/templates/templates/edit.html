{% extends "base.html" %}
{% block title %}Edit {{ template.name }} — Templates — Sandboxer{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-6">
    <a href="/templates/{{ template.name }}" class="text-sm text-slate-400 hover:text-cyan-400 transition-colors">&larr; Back to {{ template.name }}</a>
    <h1 class="text-2xl font-bold text-white mt-2">Edit Template</h1>
  </div>

  <form hx-put="/templates/{{ template.name }}" hx-swap="none" hx-disabled-elt="find button[type='submit']"
        class="bg-slate-800 rounded-xl border border-slate-700 p-6 space-y-5">

    {% if error %}
    <div class="bg-red-600/20 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
      {{ error }}
    </div>
    {% endif %}

    <div>
      <label for="name" class="block text-sm font-medium text-slate-300 mb-1.5">Name</label>
      <input type="text" id="name" name="name" value="{{ template.name }}" required
             pattern="[a-zA-Z0-9][a-zA-Z0-9_-]*" title="Alphanumeric, hyphens, and underscores only"
             class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
    </div>

    <div>
      <label for="description" class="block text-sm font-medium text-slate-300 mb-1.5">Description</label>
      <input type="text" id="description" name="description" value="{{ template.description or '' }}" placeholder="Optional description"
             class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
    </div>

    <div>
      <label for="base_image" class="block text-sm font-medium text-slate-300 mb-1.5">Base Image</label>
      <input type="text" id="base_image" name="base_image" value="{{ template.base_image }}" placeholder="docker/sandbox-templates:latest"
             class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
    </div>

    <div>
      <label for="agent_type" class="block text-sm font-medium text-slate-300 mb-1.5">Agent Type</label>
      <select id="agent_type" name="agent_type"
              class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        <option value="">None</option>
        <option value="claude" {% if template.agent_type == 'claude' %}selected{% endif %}>Claude</option>
        <option value="codex" {% if template.agent_type == 'codex' %}selected{% endif %}>Codex</option>
        <option value="gemini" {% if template.agent_type == 'gemini' %}selected{% endif %}>Gemini</option>
      </select>
    </div>

    <div>
      <label for="packages" class="block text-sm font-medium text-slate-300 mb-1.5">APT Packages <span class="text-slate-500">(one per line)</span></label>
      <textarea id="packages" name="packages" rows="3" placeholder="git&#10;curl&#10;jq"
                class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent font-mono">{{ template.packages | join('\n') }}</textarea>
    </div>

    <div>
      <label for="pip_packages" class="block text-sm font-medium text-slate-300 mb-1.5">Pip Packages <span class="text-slate-500">(one per line)</span></label>
      <textarea id="pip_packages" name="pip_packages" rows="3" placeholder="requests&#10;flask"
                class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent font-mono">{{ template.pip_packages | join('\n') }}</textarea>
    </div>

    <div>
      <label for="npm_packages" class="block text-sm font-medium text-slate-300 mb-1.5">NPM Packages <span class="text-slate-500">(one per line)</span></label>
      <textarea id="npm_packages" name="npm_packages" rows="3" placeholder="typescript&#10;prettier"
                class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent font-mono">{{ template.npm_packages | join('\n') }}</textarea>
    </div>

    <div>
      <label for="network" class="block text-sm font-medium text-slate-300 mb-1.5">Network Mode</label>
      <select id="network" name="network"
              class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        <option value="bridge" {% if template.network == 'bridge' %}selected{% endif %}>Bridge (default)</option>
        <option value="none" {% if template.network == 'none' %}selected{% endif %}>None (isolated)</option>
        <option value="host" {% if template.network == 'host' %}selected{% endif %}>Host</option>
      </select>
    </div>

    <div class="flex flex-wrap gap-6">
      <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
        <input type="checkbox" name="allow_sudo" value="true" {% if template.allow_sudo %}checked{% endif %}
               class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-cyan-500 focus:ring-cyan-500">
        Allow sudo
      </label>
      <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
        <input type="checkbox" name="read_only_workspace" value="true" {% if template.read_only_workspace %}checked{% endif %}
               class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-cyan-500 focus:ring-cyan-500">
        Read-only workspace
      </label>
    </div>

    <div class="pt-2">
      <button type="submit"
              class="w-full sm:w-auto px-6 py-2.5 bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors min-h-[44px]">
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
