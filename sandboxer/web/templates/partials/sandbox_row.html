<tr>
  <td><code>{{ s.name }}</code></td>
  <td>
    {% if s.status == "running" %}
    <mark>{{ s.status }}</mark>
    {% else %}
    {{ s.status }}
    {% endif %}
  </td>
  <td>
    {% if s.status == "running" %}
    <a href="/terminal/{{ s.name }}" role="button" class="outline" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">Shell</a>
    <button hx-post="/sandboxes/{{ s.name }}/stop" hx-target="#sandbox-list" hx-swap="innerHTML"
            hx-confirm="Stop {{ s.name }}?"
            class="outline secondary" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">Stop</button>
    {% endif %}
    <button hx-delete="/sandboxes/{{ s.name }}/rm" hx-target="#sandbox-list" hx-swap="innerHTML"
            hx-confirm="Remove {{ s.name }}? This cannot be undone."
            class="outline secondary" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">Remove</button>
  </td>
</tr>
